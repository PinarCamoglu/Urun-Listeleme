<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopLite | Ürün Listeleme</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo">ShopLite</div>
        <nav class="nav">
            <a href="#" class="active">Ana Sayfa</a>
            <a href="#">Ürünler</a>
            <a href="#">İletişim</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Tarzını Keşfet</h1>
            <p>En yeni teknoloji ürünleri ve benzersiz fırsatlar ShopLite'da seni bekliyor.</p>
            <button class="btn-hero">İncele</button>
        </section>

        <section class="filter-bar">
            <input type="text" class="search-input" placeholder="Ürün ara...">
            <div class="chips">
                <span class="chip">Yeni</span>
                <span class="chip">Popüler</span>
                <span class="chip">İndirimli</span>
            </div>
        </section>

        <section class="product-grid">
            <article class="card">
                <div class="card-img">Görsel Alanı</div>
                <div class="card-content">
                    <h3>Akıllı Saat Pro</h3>
                    <p>Yüksek çözünürlüklü ekran ve uzun pil ömrü.</p>
                    <div class="price">3.499 TL</div>
                    <button class="btn-add">Sepete Ekle</button>
                </div>
            </article>
            </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 ShopLite. Tüm Hakları Saklıdır.</p>
        <div class="footer-links">
            <a href="#">Gizlilik</a>
            <a href="#">Şartlar</a>
        </div>
    </footer>
</body>
</html>
